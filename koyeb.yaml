name: mcp-hello-bye-card
services:
  - name: web
    type: web
    git:
      branch: main
    build:
      type: buildpack
      buildpack:
        build_command: npm install && npm run build
        run_command: node dist-server/main.js
    ports:
      - port: 3001
        protocol: http
    routes:
      - path: /
        port: 3001
    instance_types:
      - type: free
    regions:
      - fra
    scalings:
      - min: 1
        max: 1
